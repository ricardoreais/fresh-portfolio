<app-header [isLandingPage]="isLandingPage" [animationOnGoing]="animationOnGoing"></app-header>
<div [@routeAnimations]="prepareRoute(outlet)" (@routeAnimations.start)="onAnimationEvent()" (@routeAnimations.done)="onAnimationEndEvent()">
    <router-outlet #outlet="outlet"></router-outlet>
</div>
@if (!isLandingPage && !animationOnGoing) {
<footer id="sticky-footer" class="py-1 bg-light text-dark-50">
    <div class="text-center my-1">
        <small>Design by Ricardo Reais</small><br />
        <small>v{{ version }}</small>
    </div>
</footer>
}
